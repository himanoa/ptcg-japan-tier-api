name: OCR Issue Images via Vertex AI

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  issues: write

jobs:
  ocr:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == '/retry')
    steps:
      - uses: actions/checkout@v4

      - name: Comment processing start
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "OCR処理を開始します..."

      - name: Extract image URLs from issue body
        id: images
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # GitHub issue内のMarkdown画像 ![alt](url) とHTMLのimg src の両方を抽出
          echo "$ISSUE_BODY" | grep -oP 'https://github\.com/user-attachments/assets/[a-f0-9-]+' > /tmp/image_urls.txt || true
          if [ ! -s /tmp/image_urls.txt ]; then
            echo "No images found in issue body"
            exit 1
          fi
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          cat /tmp/image_urls.txt

      - name: Download images
        run: |
          mkdir -p /tmp/images
          i=0
          while IFS= read -r url; do
            curl -sL "$url" -o "/tmp/images/image_${i}.png"
            i=$((i + 1))
          done < /tmp/image_urls.txt
          echo "Downloaded $i image(s)"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: OCR images via Vertex AI Gemini
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          ISSUE_NUMBER: ${{ steps.images.outputs.issue_number }}
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          API_URL="https://${GCP_REGION}-aiplatform.googleapis.com/v1/projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/publishers/google/models/gemini-2.5-flash-lite:generateContent"

          # 画像をbase64エンコードしてJSONパーツをファイルに組み立て
          echo '[]' > /tmp/parts.json
          for img in /tmp/images/image_*.png; do
            MIME_TYPE=$(file --mime-type -b "$img")
            base64 -w 0 "$img" > /tmp/b64.txt
            jq -n --arg mime "$MIME_TYPE" --rawfile b64 /tmp/b64.txt \
              '{"inlineData": {"mimeType": $mime, "data": ($b64 | rtrimstr("\n"))}}' > /tmp/part.json
            jq --slurpfile part /tmp/part.json '. + $part' /tmp/parts.json > /tmp/parts_new.json
            mv /tmp/parts_new.json /tmp/parts.json
          done

          # プロンプトを追加
          jq '. + [{"text": "これらの画像はポケモンカードゲームのティアリスト（環境デッキランキング）です。画像に含まれる全てのデッキ情報を読み取り、以下のJSON形式で出力してください。\n\nデッキ名がテキストで書かれていない場合は、カードのイラストやアイコンからポケモンを特定し、そのポケモン名をデッキ名（archetype）として使用してください。ポケモンカードゲームの環境デッキに関する知識を活用して正確に特定してください。\n\n```[{ \"archetype\": \"ドラパルト\", \"occupancy_percentage\":  37.3}, ...]```\n\nJSON以外のテキストは出力しないでください。"}]' /tmp/parts.json > /tmp/parts_final.json

          # リクエストボディを組み立て
          jq -n --slurpfile parts /tmp/parts_final.json '{
            "contents": [{"role": "user", "parts": $parts[0]}],
            "generationConfig": {"temperature": 0.0, "responseMimeType": "application/json"}
          }' > /tmp/request.json

          RESPONSE=$(curl -s -X POST "$API_URL" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json)

          # デバッグ: レスポンス構造を確認
          echo "=== Raw Response ==="
          echo "$RESPONSE" | jq '.' || echo "$RESPONSE"

          # レスポンスからJSONを抽出・整形
          OCR_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          if [ "$OCR_TEXT" = "null" ] || [ -z "$OCR_TEXT" ]; then
            echo "ERROR: Failed to extract OCR text from response"
            echo "$RESPONSE" | jq '.candidates[0]'
            exit 1
          fi
          echo "$OCR_TEXT" | jq '.' > /tmp/ocr_result.json

          echo "=== OCR Result ==="
          cat /tmp/ocr_result.json

          # latest.json と archive/yyyy-mm-dd.json に保存
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p archive
          cp /tmp/ocr_result.json latest.json
          cp /tmp/ocr_result.json "archive/${DATE}.json"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json archive/
          git commit -m "Update tier data ($(date -u +%Y-%m-%d))"
          git push

      - name: Close issue with comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "OCR処理が完了しました。データを更新しました。"
          gh issue close ${{ github.event.issue.number }}
